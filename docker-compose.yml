version: '3.8'

services:
  web:
    build: .
    container_name: sms_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=sms
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: sms_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=sms
    volumes:
      - sms_mysql_data:/var/lib/mysql
      - ./sms.sql:/docker-entrypoint-initdb.d/sms.sql
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sms_phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    depends_on:
      - db
    restart: always

volumes:
  sms_mysql_data:
